spring:
  application:
    name: order-processing-system
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/orders}
    username: ${SPRING_DATASOURCE_USERNAME:orders}
    password: ${SPRING_DATASOURCE_PASSWORD:orders}
  jpa:
    hibernate:
      ddl-auto: validate          # schema is owned by Flyway, not Hibernate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

# Background promotion job interval (ms); override for faster local testing.
orders:
  scheduler:
    promote-pending:
      fixed-rate-ms: ${ORDERS_PROMOTE_FIXED_RATE_MS:300000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.peerislands.orders: INFO
